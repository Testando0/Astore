<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">
  <title>REDZIN MARKET — Black & White Store</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

<!-- NAVBAR -->
<nav id="navbar">
  <div class="nav-logo" onclick="navigate('home')">REDZIN<span>MARKET</span></div>
  <div style="flex:1"></div>
  <button class="nav-search-btn-icon" id="search-toggle-btn" onclick="toggleMobileSearch()" title="Buscar">🔍</button>
  <div class="user-bubble-wrap" id="user-bubble-wrap">
    <button class="user-bubble" id="user-bubble" onclick="toggleUserMenu()">👤</button>
    <div class="user-dropdown" id="user-dropdown" style="display:none"></div>
  </div>
</nav>

<!-- SEARCH BAR (dropdown below nav) -->
<div class="mobile-search-bar" id="mobile-search-bar">
  <input type="text" id="mobile-search-input" placeholder="Buscar produtos..." onkeydown="if(event.key==='Enter') mobileSearch()">
  <button onclick="mobileSearch()">Buscar</button>
</div>

<!-- MAIN -->
<div id="main"></div>

<!-- CHAT PANEL -->
<div class="chat-panel" id="chat-panel">
  <div class="chat-panel-header">
    <button class="chat-back-btn" onclick="closeChatPanel()">←</button>
    <div class="chat-panel-user">
      <img id="chat-panel-avatar" src="" alt="">
      <div>
        <div id="chat-panel-name">Chat</div>
        <div id="chat-panel-status" class="chat-status">online</div>
      </div>
    </div>
    <button class="chat-close-btn" onclick="closeChatPanel()">×</button>
  </div>
  <div class="chat-messages" id="chat-messages"></div>
  <div class="chat-input-area" id="chat-input-area">
    <input type="text" id="chat-input" class="chat-input" placeholder="Digite uma mensagem..." onkeydown="if(event.key==='Enter') sendChatMessage()">
    <button class="chat-send-btn" onclick="sendChatMessage()">➤</button>
  </div>
</div>
<div class="chat-overlay" id="chat-overlay" onclick="closeChatPanel()"></div>

<!-- TOAST CONTAINER -->
<div id="toast-container"></div>

<!-- MODALS -->
<div id="modal-container"></div>

<script src="app.js"></script>
</body>
</html>
